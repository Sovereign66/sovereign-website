<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sovereign Automation & Manufacturing</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- MENU -->
<div id="menu"></div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">

        <img src="assets/images/logo.png" alt="logo" style="height:110px;">

        <h1>SOVEREIGN AUTOMATION & MANUFACTURING</h1>

        <p>
        Industrial Automation | Wire & Cable Machinery | Solar Structures | Industrial Blowers
        </p>

        <a href="#consultation" class="hero-btn">Get Consultation</a>

    </div>
</section>

<!-- CATEGORIES -->
<section>
    <h2 style="text-align:center;">Our Core Divisions</h2>
    <div id="categories"></div>
</section>

<!-- STATS -->
<div id="stats"></div>

<!-- CONSULTATION FORM -->
<section class="lead-form" id="consultation">

    <h2>Send Us Your Inquiry</h2>

    <form id="contactForm">

        <div class="form-row">
            <input type="text" name="user_name" placeholder="Your Name" required>
            <input type="email" name="user_email" placeholder="Your Email" required>
        </div>

        <div class="form-row">
            <input type="tel" name="user_phone" placeholder="Your Phone">
        </div>

        <textarea name="message" placeholder="Your Requirement"></textarea>

        <button type="submit">Submit Inquiry</button>

    </form>

    <div id="formSuccess">
        ✔ Thank you! Our team will contact you shortly.
    </div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="js/main.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm(
    "service_r7os0j8",
    "template_8ygz60g",
    this
)
.then(function(response){
    console.log("SUCCESS!", response.status, response.text);

    document.getElementById("formSuccess").style.display = "block";
    document.getElementById("contactForm").reset();

    setTimeout(() => {
        document.getElementById("formSuccess").style.display = "none";
    }, 4000);

}, function(error){
    console.log("FAILED...", error);

    alert("❌ Failed to send enquiry. Check console.");
});
});
</script>

</body>

<div id="productPanel" class="product-panel">
<div class="panel-content">

<button class="close-btn" onclick="closePanel()">✖</button>

<div id="panelData"></div>

</div>
</div>
    
</html>
